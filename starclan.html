  if (o.injured.length) {
    const inj = el("div", "res-narr");
    inj.style.borderColor = "#c0563f";
    inj.textContent = (o.injured.length === 1 ? o.injured[0] + " was hurt" : o.injured.join(" and ") + " were hurt") + " and needs the medicine den to heal.";
    inner.appendChild(inj);
  }

  const foot = el("div", "story-foot");
  foot.appendChild(btn("btn btn-primary btn-full", "Continue \u2192", afterResolution));
  inner.appendChild(foot);
  showScreen("resolution");
}

function afterResolution() {
  const s = UI.S;
  // 1. event?
  if (s._pendingEvent) {
    const ev = s._pendingEvent;
    s._pendingEvent = null;
    showEvent(ev);
    return;
  }
  // 2. cinematic (rank up or arc transition)?
  if (playPendingCinematic(backToMap)) return;
  backToMap();
}

// Plays the pending rank-up or arc-transition cinematic if present.
// Returns true if a cinematic was shown (caller should stop).
function playPendingCinematic(then) {
  const s = UI.S;
  const change = s.pendingCinematic;
  if (change == null) return false;
  s.pendingCinematic = null;
  if (typeof change === "object" && change.arc != null) {
    showArcTransition(then);
    return true;
  }
  // rank-up: change is {rank: n} (or legacy number)
  const ri = (typeof change === "object") ? change.rank : change;
  showRankCinematic(ri, then);
  return true;
}

// =====================================================
// EVENT SCREEN
// =====================================================
function buildEventScreen() {
  const scr = el("div", "screen"); scr.id = "screen-event";
  const inner = el("div", "story-inner");
  scr.appendChild(inner);
  registerScreen("event", scr);
  scr._refs = { inner };
}
function showEvent(ev) {
  const s = UI.S;
  const { inner } = UI.screens["event"]._refs;
  clear(inner);
  inner.appendChild(el("div", "event-icon", ev.icon || "\u2728"));
  inner.appendChild(el("div", "event-title display", ev.title));
  inner.appendChild(el("div", "event-text", tokens(ev.text)));

  if (!s.seenEvents.includes(ev.id)) s.seenEvents.push(ev.id);

  if (ev.hasChoice && ev.choices && ev.choices.length) {
    ev.choices.forEach(choice => {
      const b = btn("event-choice");
      b.appendChild(el("div", "event-choice-label", choice.label));
      if (choice.effect_description) b.appendChild(el("div", "event-choice-desc", choice.effect_description));
      onActivate(b, () => resolveEventChoice(ev, choice));
      inner.appendChild(b);
    });
  } else {
    const foot = el("div", "story-foot");
    foot.appendChild(btn("btn btn-primary btn-full", "Continue \u2192", afterEvent));
    inner.appendChild(foot);
  }
  showScreen("event");
}
function resolveEventChoice(ev, choice) {
  const s = UI.S;
  const applied = E.applyChoiceEffects(s, choice.effects);
  save();
  // show a brief result then continue
  const { inner } = UI.screens["event"]._refs;
  clear(inner);
  inner.appendChild(el("div", "event-icon", ev.icon || "\u2728"));
  inner.appendChild(el("div", "event-title display", choice.label));
  inner.appendChild(el("div", "event-text", choice.effect_description || "The Clan acts."));

  // deltas
  const deltas = el("div", "res-deltas");
  const items = [
    ["\ud83c\udf56", "Prey", applied.prey], ["\ud83c\udf3f", "Herbs", applied.herbs],
    ["\u2691", "Territory", applied.territory], ["\u2665", "Morale", applied.morale],
  ];
  let any = false;
  items.forEach(([ico, label, val]) => {
    if (!val) return; any = true;
    const row = el("div", "res-delta");
    const lab = el("div", "res-delta-label");
    lab.appendChild(el("span", null, ico)); lab.appendChild(el("span", null, label));
    row.appendChild(lab);
    row.appendChild(el("div", "res-delta-val " + (val > 0 ? "pos" : "neg"), (val > 0 ? "+" : "") + val));
    deltas.appendChild(row);
  });
  if (applied.xp) { any = true; const row = el("div", "res-delta"); const lab = el("div", "res-delta-label"); lab.appendChild(el("span", null, "\u2b50")); lab.appendChild(el("span", null, "Experience")); row.appendChild(lab); row.appendChild(el("div", "res-delta-val pos", "+" + applied.xp)); deltas.appendChild(row); }
  if (any) inner.appendChild(deltas);

  const notes = [];
  if (applied.healed) notes.push((applied.healed === 1 ? "A cat was healed." : applied.healed + " cats were healed."));
  if (applied.injuredOne) notes.push(applied.injuredOne + " was hurt.");
  if (applied.sickOne) notes.push(applied.sickOne + " fell ill.");
  if (applied.reveal) notes.push("New territory revealed.");
  if (notes.length) inner.appendChild(el("div", "res-narr", notes.join(" ")));

  // a rank-up or arc transition may have been triggered by xp from the choice
  const change = E.checkRankUp(s, STORY_ARCS.length);
  if (change != null) s.pendingCinematic = change;

  const foot = el("div", "story-foot");
  foot.appendChild(btn("btn btn-primary btn-full", "Continue \u2192", afterEvent));
  inner.appendChild(foot);
}
function afterEvent() {
  if (playPendingCinematic(backToMap)) return;
  backToMap();
}

function backToMap() {
  save();
  showScreen("game");
  selectedZoneId = null;
  renderHUD();
  layoutMap();
  drawMap();
  // gentle nudge toward end moon when out of patrols
  if (!E.canPatrol(UI.S)) {
    coach("endmoon", "No patrols left this moon. Tap <strong>End Moon</strong> to let the Clan rest and eat \u2014 then a new moon begins.", { btnText: "Got it", top: window.innerHeight * 0.16 });

function buildMoonSummaryScreen() {

function showMoonSummary(result) {
  const s = UI.S;
  const { inner } = UI.screens["moon"]._refs;

  const season = E.curSeason(s);
  const sm = E.SEASON_MOD[season];

  inner.appendChild(el("div", "cinematic-kicker", "MOON " + moonInYear + " \u00b7 " + season.toUpperCase()));

  result.events.forEach(e => {
    if (e.type === "eat") lines.push("\ud83c\udf56 The Clan shared " + e.amount + " prey from the fresh-kill pile.");

    else if (e.type === "left") lines.push("\ud83d\udc3e " + e.name + " left the Clan to find food elsewhere. The Clan mourns.");
    else if (e.type === "sick") lines.push("\ud83e\udda0 " + e.name + " has fallen ill and needs herbs to recover.");
    else if (e.type === "healed") lines.push("\ud83c\udf3f " + e.name + " has recovered and is ready to patrol.");
    else if (e.type === "low_morale") lines.push("\ud83d\udc94 Clan spirits are low. Cats will not patrol until morale recovers.");
    else if (e.type === "rival_contest") lines.push("\u2694\ufe0f Rivals press on your thin borders, taking a little territory.");
    else if (e.type === "kit") lines.push("\ud83d\udc31 A kit named " + e.name + " was born in the nursery!");
    else if (e.type === "apprentice") lines.push("\ud83c\udf1f " + e.name + " is now an apprentice, ready to train.");
    else if (e.type === "warrior") lines.push("\u2694\ufe0f " + e.name + " has earned their warrior name!");
  });

  const box = el("div", "res-narr");
  box.innerHTML = lines.map(l => "<div style='margin-bottom:6px'>" + l + "</div>").join("");
  inner.appendChild(box);

  // resource snapshot
  const snap = el("div", "res-deltas");
  [["\ud83c\udf56", "Prey", Math.round(s.res.prey)], ["\ud83c\udf3f", "Herbs", Math.round(s.res.herbs)],
   ["\u2691", "Territory", Math.round(s.res.territory)], ["\u2665", "Morale", Math.round(s.res.morale)]].forEach(([ico, label, val]) => {
    const row = el("div", "res-delta");
    const lab = el("div", "res-delta-label");
    lab.appendChild(el("span", null, ico)); lab.appendChild(el("span", null, label));
    row.appendChild(lab); row.appendChild(el("div", "res-delta-val", String(val)));
    snap.appendChild(row);
  });

  const foot = el("div", "story-foot");
  foot.appendChild(btn("btn btn-primary btn-full", "Begin Moon " + (((s.moon - 1) % 12) + 1) + " \u2192", backToMap));

function buildSeasonScreen() {

function showSeasonEnd() {
  const s = UI.S;
  const { inner } = UI.screens["season"]._refs;
  clear(inner);
  const finalScore = s.seasonScore;
  const rank = E.seasonRank(finalScore);
  if (finalScore > s.bestScore) s.bestScore = finalScore;

  inner.appendChild(el("div", "cinematic-kicker", "A FULL YEAR HAS PASSED"));
  const badge = el("div", "season-rank-badge");
  badge.appendChild(el("div", "cinematic-kicker", "YOUR CLAN IS"));
  badge.appendChild(el("div", "season-rank-name display", rank));
  badge.appendChild(el("div", "season-score", finalScore.toLocaleString()));
  badge.appendChild(el("div", "res-sub", "Best: " + s.bestScore.toLocaleString()));
  inner.appendChild(badge);

  // ladder vs rivals
  inner.appendChild(el("div", "eyebrow", "THE CLANS THIS YEAR"));
  inner.appendChild(el("div", "spacer-sm"));
  const ladder = [...E.RIVAL_CLANS.map(r => ({ name: r.name, score: r.score, you: false })),
                  { name: (s.clanName || "Your Clan"), score: finalScore, you: true }];
  ladder.sort((a, b) => b.score - a.score);
  ladder.forEach(row => {
    const r = el("div", "ladder-row" + (row.you ? " you" : (finalScore > row.score ? " beaten" : "")));
    const left = el("div");
    left.appendChild(el("div", "ladder-name", row.name + (row.you ? " (You)" : "")));
    if (!row.you) {
      const taunts = RIVAL_TAUNTS[row.name];
      if (taunts && finalScore < row.score) left.appendChild(el("div", "ladder-taunt", "\u201c" + E.pick(taunts) + "\u201d"));
      else if (taunts && finalScore >= row.score) left.appendChild(el("div", "ladder-taunt", "Bested by your Clan."));
    }
    r.appendChild(left);
    r.appendChild(el("div", "ladder-pts", row.score.toLocaleString()));
    ladder_append(ladder, inner, r);
  });

  const foot = el("div", "story-foot");
  foot.appendChild(btn("btn btn-primary btn-full", "Lead Another Year \u2192", () => {
    // new year: reset season score, keep clan/progress
    s.seasonScore = 0;
    s.moonScore = 0;
    save();
    backToMap();
  }));
  inner.appendChild(foot);
  showScreen("season");
}
function ladder_append(ladder, inner, r) {
  // find or create ladder container
  let lc = inner.querySelector(".ladder-container");
  if (!lc) { lc = el("div", "ladder-container"); inner.appendChild(lc); }
  lc.appendChild(r);
}

const STRUCTURES = [
  { key: "fresh_kill_pile", name: "Fresh-Kill Pile", icon: "\ud83c\udf56", desc: "Holds more prey before it spoils.",
    benefit: lvl => "Prey storage: " + [100,100,130,160][lvl], cost: lvl => ({ prey: [0,40,60,0][lvl] || 99 }) },
  { key: "medicine_den", name: "Medicine Den", icon: "\ud83c\udf3f", desc: "Heals more cats each moon and lowers sickness.",
    benefit: lvl => "Heals " + [0,1,2,3][lvl] + " cat/moon", cost: lvl => ({ herbs: [0,30,45,0][lvl] || 99 }) },
  { key: "training_grounds", name: "Training Grounds", icon: "\ud83e\udd4b", desc: "More patrols per moon.",
    benefit: lvl => (1 + Math.min(2, lvl)) + " patrols/moon", cost: lvl => ({ prey: [25,35,0][lvl] || 99, herbs: [10,15,0][lvl] || 99 }) },
  { key: "watchtower", name: "Watchtower", icon: "\ud83d\uddfc", desc: "Reveals new territory and warns of rivals.",
    benefit: lvl => "Reveals " + [0,1,2,3][lvl] + " zones", cost: lvl => ({ prey: [20,30,0][lvl] || 99, territory: [10,15,0][lvl] || 99 }) },
  { key: "nursery", name: "Nursery", icon: "\ud83c\udf3c", desc: "Kits are born to grow your Clan.",
    benefit: lvl => [0,5,10,15][lvl] + "% kit chance", cost: lvl => ({ herbs: [20,30,0][lvl] || 99 }) },
  { key: "leaders_rock", name: "Leader's Rock", icon: "\ud83e\udea8", desc: "Lifts Clan morale.",
    benefit: lvl => "+" + [0,5,10,15][lvl] + " morale", cost: lvl => ({ prey: [20,0,0][lvl] || 99, herbs: [20,0,0][lvl] || 99 }) },
];

function openCampSheet() {
  const s = UI.S;
  openSheet((sheet) => {
    sheet.appendChild(el("div", "sheet-grip"));
    const head = el("div", "sheet-head");
    head.appendChild(el("div", "sheet-title", s.clanName || "Your Camp"));
    head.appendChild(el("div", "sheet-sub", s.clan.length + " cats \u00b7 " + E.curSeason(s) + " \u00b7 Moon " + (((s.moon - 1) % 12) + 1)));
    sheet.appendChild(head);

    const body = el("div", "sheet-body");

    // CLAN ROSTER
    body.appendChild(el("div", "cat-select-hint", "YOUR CLAN"));
    s.clan.forEach(cat => {
      const b = el("div", "cat-btn"); // non-interactive display row
      const canvas = document.createElement("canvas"); canvas.className = "cat-portrait";
      drawCat(canvas, cat, 42 / 24);
      const info = el("div", "cat-info");
      info.appendChild(el("div", "cat-name", cat.name));
      info.appendChild(el("div", "cat-role", cat.role + " \u00b7 " + cat.specialty + " \u00b7 " + cat.personality));
      if (cat.injured) info.appendChild(el("div", "cat-status", "Injured \u2014 healing"));
      else if (cat.sick) info.appendChild(el("div", "cat-status", "Sick \u2014 resting"));
      else if (cat.role === "kit") info.appendChild(el("div", "cat-trait", "A young kit"));
      b.appendChild(canvas); b.appendChild(info);
      body.appendChild(b);
    });

    body.appendChild(el("div", "spacer-md"));
    body.appendChild(el("div", "cat-select-hint", "BUILD THE CAMP"));

    STRUCTURES.forEach(st => {
      const lvl = s.structures[st.key] || 0;
      const maxed = lvl >= 3;
      const cost = maxed ? null : st.cost(lvl);
      const b = btn("event-choice");
      const top = el("div"); top.style.display = "flex"; top.style.justifyContent = "space-between"; top.style.alignItems = "center";
      const left = el("div");
      left.appendChild(el("div", "event-choice-label", st.icon + " " + st.name + "  \u00b7  Lv " + lvl));
      left.appendChild(el("div", "event-choice-desc", st.desc + "  (" + st.benefit(lvl) + (maxed ? "" : " \u2192 " + st.benefit(lvl + 1)) + ")"));
      top.appendChild(left);
      b.appendChild(top);
      if (maxed) {
        b.appendChild(el("div", "event-choice-desc", "\u2728 Fully built"));
        b.disabled = true;
      } else {
        const costStr = Object.entries(cost).map(([k, v]) => v + " " + k).join(", ");
        const can = canAfford(s, cost);
        b.appendChild(el("div", "event-choice-desc", "Cost: " + costStr + (can ? "" : "  \u2014 not enough")));
        if (!can) b.disabled = true;
        else onActivate(b, () => startUpgrade(st));
      }
      body.appendChild(b);
    });

    sheet.appendChild(body);
    const foot = el("div", "sheet-foot");
    foot.appendChild(btn("btn btn-ghost btn-full", "Back to map", closeSheet));
    sheet.appendChild(foot);
  });
}
function canAfford(s, cost) {
  return Object.entries(cost).every(([k, v]) => s.res[k] >= v);
}
function startUpgrade(st) {
  const s = UI.S;
  const lvl = s.structures[st.key] || 0;
  const cost = st.cost(lvl);
  if (!canAfford(s, cost)) { toast("Not enough resources"); return; }
  // upgrades require a short 3-problem math challenge (2/3 to succeed)
  closeSheet();
  startUpgradeMath(st, cost);
}

// Reuse the math screen with a 3-problem challenge for upgrades
function startUpgradeMath(st, cost) {
  const s = UI.S;
  UI.mathSession = {
    exp: { upgrade: st.key }, zone: { name: "Build " + st.name },
    problems: (() => { const arr = []; for (let i = 0; i < 3; i++) arr.push(E.genProblem(s)); return arr; })(),
    idx: 0, correct: 0, wrong: 0, fast: 0, current: "", isUpgrade: true, upgradeSt: st, upgradeCost: cost,
  };
  const { zoneName, progress } = UI.screens["math"]._refs;
  zoneName.textContent = "BUILD \u00b7 " + st.name;
  clear(progress);
  UI.mathSession.problems.forEach((_, i) => progress.appendChild(el("div", "mp-dot" + (i === 0 ? " current" : ""))));
  showScreen("math");
  showProblem();
  startTimer();
}

function finishUpgrade() {
  const s = UI.S;
  const ms = UI.mathSession;
  stopTimer();
  const succeeded = ms.correct >= 2;
  const st = ms.upgradeSt, cost = ms.upgradeCost;
  if (succeeded) {
    // pay cost, raise level
    Object.entries(cost).forEach(([k, v]) => { s.res[k] = Math.max(0, s.res[k] - v); });
    s.structures[st.key] = (s.structures[st.key] || 0) + 1;
    // leaders_rock immediate morale, watchtower reveal handled via territory
    if (st.key === "leaders_rock") s.res.morale = Math.min(100, s.res.morale + [0,5,10,15][s.structures[st.key]]);
    if (st.key === "watchtower") s.res.territory = Math.min(100, s.res.territory + 6);
    if (st.key === "training_grounds") { s.maxPatrols = Math.min(3, 1 + s.structures[st.key]); s.patrolsRemaining = Math.max(s.patrolsRemaining, 1); }
  }
  save();
  UI.mathSession = null;
  // show result via resolution-style screen
  const { inner } = UI.screens["resolution"]._refs;
  clear(inner);
  const head = el("div", "res-head");
  if (succeeded) {
    head.appendChild(el("div", "res-grade good", st.name + " Built!"));
    head.appendChild(el("div", "res-sub", ms.correct + " / 3 correct"));
    inner.appendChild(head);
    const txt = UPGRADE_TEXT[st.key] ? E.pick(UPGRADE_TEXT[st.key]) : "The camp grows stronger.";
    inner.appendChild(el("div", "res-narr", txt));
  } else {
    head.appendChild(el("div", "res-grade poor", "Not Yet"));
    head.appendChild(el("div", "res-sub", ms.correct + " / 3 correct \u2014 need 2 to build"));
    inner.appendChild(head);
    inner.appendChild(el("div", "res-narr", "The work isn't ready. Sharpen your math and try again \u2014 no resources were spent."));
  }
  const foot = el("div", "story-foot");
  foot.appendChild(btn("btn btn-primary btn-full", "Continue \u2192", backToMap));
  inner.appendChild(foot);
  showScreen("resolution");
}

// =====================================================
// ERROR BOUNDARY — turn any uncaught crash into a recoverable hiccup
// =====================================================
let recovering = false;
function recoverFromError(where) {
  if (recovering) return; // avoid recovery loops
  recovering = true;
  try {
    // try to save whatever valid state we have
    if (UI.S && UI.S.clan && UI.S.clan.length) {
      // clear any transient/half-done state
      UI.S.activeExpedition = null;
      UI.S.pendingCinematic = null;
      UI.S._pendingEvent = null;
      UI.mathSession = null;
      // make sure no cat is stuck mid-patrol
      UI.S.clan.forEach(c => { c.onPatrol = false; });
      save();
      // return to a known-good screen
      document.querySelectorAll(".coach").forEach(c => c.remove());
      closeSheet();
      showScreen("game");
      selectedZoneId = null;
      renderHUD();
      requestAnimationFrame(() => { layoutMap(); drawMap(); });
      toast("That hiccuped — back to camp. Your Clan is safe.", 2600);
    } else {
      // no usable game; restart cleanly
      introPage = 1;
      renderIntro();
      showScreen("intro");
    }
  } catch (e2) {
    // last resort: hard reset
    try { wipeSave(); location.reload(); } catch (e3) {}
  }
  setTimeout(() => { recovering = false; }, 1500);
}

window.addEventListener("error", (ev) => {
  // ignore benign resource errors (e.g. favicon)
  if (ev && ev.message && /favicon|ResizeObserver/.test(ev.message)) return;
  recoverFromError("error");
});
window.addEventListener("unhandledrejection", () => recoverFromError("promise"));

// =====================================================
// BOOT
// =====================================================
function boot() {
  buildIntroScreen();
  buildMakerScreen();
  buildStoryScreen();
  buildGameScreen();
  buildMathScreen();
  buildResolutionScreen();
  buildEventScreen();
  buildMoonSummaryScreen();
  buildSeasonScreen();

  const had = load();
  if (had && UI.S && UI.S.clan && UI.S.clan.length) {
    // returning player: go straight to map
    if (!UI.S.coachSeen) UI.S.coachSeen = {};
    showScreen("game");
    selectedZoneId = null;
    renderHUD();
    requestAnimationFrame(() => { layoutMap(); drawMap(); });
  } else {
    introPage = 1;
    renderIntro();
    showScreen("intro");
  }
  // start map animation loop
  animateMap();

  // expose a dev API for the test harness
  window.SCW = {
    get S() { return UI.S; },
    E, ZONES, EVENTS,
    showScreen, renderHUD, layoutMap, drawMap, save, load, wipeSave, validateAndRepair,
    _internal: {
      onMapClick, openZoneSheet, launchExpedition, startMath, onNumKey,
      submitAnswer, finishMath, doEndMoon, backToMap,
      confirmCat, goToMaker,
      get mathSession() { return UI.mathSession; },
      get selectedZoneId() { return selectedZoneId; }, set selectedZoneId(v) { selectedZoneId = v; },
    },
  };
}

boot();
