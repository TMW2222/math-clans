<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>StarClan's Watch</title>
<link rel="icon" href="data:,">
<style>
/* ============================================================
   StarClan's Watch — dusk-forest visual system
   Palette: deep pine + bark, ember/fire accent (the "spark"
   motif of Arc 1), StarClan silver for sacred moments.
   ============================================================ */
:root{
  --night:#10140f;          /* deepest background - forest at night */
  --bark:#1c241a;           /* panel background - dark bark */
  --bark-2:#27331f;         /* raised surface */
  --moss:#33402a;           /* borders, dividers */
  --moss-line:#3f4f33;
  --leaf:#7fae5a;           /* healthy green - prey/positive */
  --leaf-dim:#5c7e42;
  --ember:#f0863a;          /* fire accent - primary action, the spark */
  --ember-deep:#c75f22;
  --ember-glow:#ffb066;
  --silver:#c9d6e8;         /* StarClan - sacred moments */
  --silver-dim:#8a9bb5;
  --herb:#5fb6a8;           /* teal - herbs/medicine */
  --blood:#c0563f;          /* warning / injury */
  --gold:#e8b84a;           /* rank / achievement */
  --parch:#e8e0cf;          /* primary text - moonlit parchment */
  --parch-dim:#a8a08c;      /* secondary text */
  --parch-faint:#6f6a5c;    /* tertiary text */
  --ds: 'Georgia', 'Times New Roman', serif;       /* display - storybook */
  --bd: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; /* body */
  --mo: 'SF Mono', 'Menlo', 'Consolas', monospace; /* numbers/data */
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.hidden{display:none !important;}

html,body{height:100%;}
body{
  font-family:var(--bd);
  background:var(--night);
  color:var(--parch);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
  position:fixed;
  width:100%;
  touch-action:manipulation;
}

#app{
  position:relative;
  width:100%;
  height:100dvh;
  max-width:480px;
  margin:0 auto;
  overflow:hidden;
  background:
    radial-gradient(120% 80% at 50% -10%, #1a2416 0%, var(--night) 60%);
}

/* ---- generic screen container ---- */
.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.screen-scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:
    calc(env(safe-area-inset-top,0px) + 16px) 18px
    calc(env(safe-area-inset-bottom,0px) + 16px);
}

/* ---- buttons ---- */
button{
  font-family:var(--bd);
  cursor:pointer;
  border:none;
  background:none;
  color:inherit;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:52px;
  padding:14px 22px;
  border-radius:14px;
  font-size:17px;
  font-weight:600;
  letter-spacing:0.2px;
  transition:transform .08s ease, filter .15s ease, background .15s ease;
  user-select:none;
}
.btn:active{transform:scale(0.97);}
.btn-primary{
  background:linear-gradient(180deg, var(--ember) 0%, var(--ember-deep) 100%);
  color:#1a0f05;
  box-shadow:0 4px 18px rgba(240,134,58,0.32), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-primary:active{filter:brightness(1.08);}
.btn-ghost{
  background:var(--bark-2);
  color:var(--parch);
  border:1.5px solid var(--moss-line);
}
.btn-ghost:active{background:var(--moss);}
.btn-silver{
  background:linear-gradient(180deg, #4a5a72 0%, #2f3a4c 100%);
  color:var(--silver);
  border:1px solid var(--silver-dim);
  box-shadow:0 0 22px rgba(201,214,232,0.18);
}
.btn:disabled{opacity:0.4;filter:saturate(0.4);cursor:default;}
.btn:disabled:active{transform:none;}
.btn-full{width:100%;}

/* ---- typography helpers ---- */
.display{font-family:var(--ds);}
.eyebrow{
  font-family:var(--mo);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ember-glow);
}
.eyebrow-silver{color:var(--silver-dim);}
.h1{font-family:var(--ds);font-size:30px;line-height:1.15;font-weight:700;color:var(--parch);}
.h2{font-family:var(--ds);font-size:23px;line-height:1.2;font-weight:700;color:var(--parch);}
.lede{font-size:16px;line-height:1.6;color:var(--parch-dim);}
.body-text{font-size:16px;line-height:1.65;color:var(--parch);}

/* ============================================================
   INTRO SCREENS
   ============================================================ */
#screen-intro .screen-scroll{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:0;
}
.intro-art{
  width:100%;
  max-width:320px;
  height:200px;
  margin-bottom:28px;
}
.intro-page{display:none;flex-direction:column;align-items:center;width:100%;animation:fadeUp .5s ease;}
.intro-page.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.intro-kicker{
  font-family:var(--mo);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ember-glow);margin-bottom:14px;
}
.intro-title{font-family:var(--ds);font-size:32px;line-height:1.1;font-weight:700;margin-bottom:18px;}
.intro-body{font-size:16.5px;line-height:1.7;color:var(--parch-dim);max-width:340px;margin-bottom:14px;}
.intro-body strong{color:var(--parch);font-weight:600;}
.intro-dots{display:flex;gap:8px;margin:26px 0 22px;}
.intro-dot{width:8px;height:8px;border-radius:50%;background:var(--moss-line);transition:background .2s;}
.intro-dot.on{background:var(--ember);}
.intro-controls{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;}
.intro-skip{
  position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);right:18px;
  font-family:var(--mo);font-size:13px;color:var(--parch-faint);
  padding:8px 12px;letter-spacing:0.05em;z-index:5;
}

/* ============================================================
   CAT MAKER
   ============================================================ */
.maker-stage{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 18px;
}
#maker-canvas{
  width:128px;height:128px;
  image-rendering:pixelated;image-rendering:crisp-edges;
  background:radial-gradient(circle at 50% 40%, #232e1c 0%, #161d12 70%);
  border-radius:18px;
  border:1.5px solid var(--moss-line);
  box-shadow:inset 0 2px 12px rgba(0,0,0,0.4);
}
.maker-name-row{
  display:flex;align-items:baseline;gap:8px;margin-top:14px;
  font-family:var(--ds);font-size:22px;color:var(--gold);font-weight:700;
}
.opt-group{margin-bottom:18px;}
.opt-label{
  font-family:var(--mo);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--parch-dim);margin-bottom:10px;display:flex;justify-content:space-between;
}
.opt-row{display:flex;flex-wrap:wrap;gap:8px;}
.swatch{
  min-width:46px;height:46px;border-radius:11px;
  border:2px solid transparent;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:var(--parch);
  background:var(--bark-2);
  transition:transform .08s, border-color .12s;
}
.swatch:active{transform:scale(0.93);}
.swatch.sel{border-color:var(--ember);box-shadow:0 0 0 2px rgba(240,134,58,0.25);}
.swatch.color-sw{font-size:0;}
.chip{
  padding:11px 16px;border-radius:11px;
  background:var(--bark-2);border:2px solid transparent;
  font-size:15px;font-weight:600;color:var(--parch);
  transition:transform .08s, border-color .12s;
}
.chip:active{transform:scale(0.95);}
.chip.sel{border-color:var(--ember);background:var(--moss);}
.name-input{
  flex:1;min-width:120px;
  background:var(--bark-2);border:1.5px solid var(--moss-line);
  border-radius:11px;padding:12px 14px;
  font-family:var(--ds);font-size:17px;color:var(--parch);
}
.name-input::placeholder{color:var(--parch-faint);}
.maker-sticky{
  padding:14px 18px calc(env(safe-area-inset-bottom,0px) + 14px);
  background:linear-gradient(180deg, transparent, var(--night) 24%);
  border-top:1px solid var(--moss);
}

/* ============================================================
   MAP / MAIN GAME
   ============================================================ */
#screen-game{display:flex;flex-direction:column;}
.hud{
  padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
  background:linear-gradient(180deg, rgba(16,20,15,0.96), rgba(16,20,15,0.0));
  position:relative;z-index:3;
}
.hud-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.season-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 11px;border-radius:20px;
  font-family:var(--mo);font-size:12px;font-weight:500;letter-spacing:0.04em;
  border:1px solid var(--moss-line);
}
.moon-label{font-family:var(--mo);font-size:12px;color:var(--parch-dim);}
.resbar{display:flex;gap:7px;}
.res{
  flex:1;background:var(--bark);border:1px solid var(--moss);
  border-radius:10px;padding:7px 8px;text-align:center;position:relative;overflow:hidden;
}
.res-fill{position:absolute;left:0;bottom:0;width:100%;opacity:0.16;transition:height .4s ease;}
.res-ico{font-size:15px;line-height:1;}
.res-val{font-family:var(--mo);font-size:15px;font-weight:600;margin-top:2px;position:relative;}
.res-name{font-family:var(--mo);font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--parch-faint);position:relative;}

/* canvas map fills the middle */
.map-wrap{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  min-height:0;padding:4px 10px;
}
#map-canvas{
  width:100%;height:100%;
  touch-action:none;
}
/* floating delta numbers */
.delta-layer{position:absolute;inset:0;pointer-events:none;z-index:6;overflow:hidden;}
.delta{
  position:absolute;font-family:var(--mo);font-size:16px;font-weight:700;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
  animation:floatUp 1.6s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(6px) scale(0.9);}
  15%{opacity:1;transform:translateY(0) scale(1.05);}
  80%{opacity:1;}
  100%{opacity:0;transform:translateY(-40px) scale(1);}
}

/* rank journey strip */
.rank-strip{
  padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 8px);
  background:linear-gradient(0deg, rgba(16,20,15,0.96), rgba(16,20,15,0.0));
  position:relative;z-index:3;
}
.rank-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.rank-now{font-family:var(--ds);font-size:15px;font-weight:700;color:var(--gold);}
.rank-xp{font-family:var(--mo);font-size:11px;color:var(--parch-dim);}
.rank-track{display:flex;align-items:center;gap:0;}
.rank-node{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;
}
.rank-line{position:absolute;top:7px;left:-50%;width:100%;height:2px;background:var(--moss);z-index:0;}
.rank-node:first-child .rank-line{display:none;}
.rank-line.done{background:var(--gold);}
.rank-dot{
  width:15px;height:15px;border-radius:50%;background:var(--bark-2);
  border:2px solid var(--moss-line);z-index:1;transition:all .3s;
}
.rank-dot.done{background:var(--gold);border-color:var(--gold);}
.rank-dot.current{background:var(--ember);border-color:var(--ember-glow);
  box-shadow:0 0 10px rgba(240,134,58,0.6);transform:scale(1.25);}
.rank-tag{font-family:var(--mo);font-size:8px;letter-spacing:0.02em;color:var(--parch-faint);
  text-align:center;max-width:54px;line-height:1.1;}
.rank-tag.current{color:var(--ember-glow);}

/* primary action dock */
.action-dock{
  padding:6px 16px calc(env(safe-area-inset-bottom,0px) + 12px);
  position:relative;z-index:3;
}

/* ============================================================
   SLIDE-UP PANELS (sheets)
   ============================================================ */
.sheet-scrim{
  position:absolute;inset:0;background:rgba(8,10,7,0.66);
  z-index:20;opacity:0;transition:opacity .25s;pointer-events:none;
}
.sheet-scrim.show{opacity:1;pointer-events:auto;}
.sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:21;
  background:var(--bark);
  border-top-left-radius:22px;border-top-right-radius:22px;
  border-top:1px solid var(--moss-line);
  max-height:88%;display:flex;flex-direction:column;
  transform:translateY(101%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -12px 40px rgba(0,0,0,0.5);
}
.sheet.show{transform:translateY(0);}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--moss-line);margin:10px auto 4px;}
.sheet-head{padding:6px 20px 12px;border-bottom:1px solid var(--moss);}
.sheet-title{font-family:var(--ds);font-size:21px;font-weight:700;}
.sheet-sub{font-size:13.5px;color:var(--parch-dim);margin-top:3px;line-height:1.45;}
.sheet-body{
  padding:16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;
}
.sheet-foot{
  padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 14px);
  border-top:1px solid var(--moss);
  display:flex;flex-direction:column;gap:9px;
}
.zone-meta{display:flex;gap:8px;margin-bottom:14px;}
.zone-stat{
  flex:1;background:var(--bark-2);border-radius:10px;padding:8px 10px;text-align:center;
}
.zone-stat-v{font-family:var(--mo);font-size:15px;font-weight:600;}
.zone-stat-l{font-family:var(--mo);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--parch-faint);margin-top:2px;}

/* cat select buttons */
.cat-select-hint{font-family:var(--mo);font-size:11px;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--parch-dim);margin-bottom:9px;display:flex;justify-content:space-between;}
.cat-btn{
  width:100%;display:flex;align-items:center;gap:12px;
  background:var(--bark-2);border:2px solid transparent;
  border-radius:13px;padding:10px 12px;margin-bottom:8px;
  text-align:left;transition:transform .07s, border-color .12s, background .12s;
}
.cat-btn:active{transform:scale(0.985);}
.cat-btn.sel{border-color:var(--leaf);background:var(--moss);}
.cat-btn:disabled{opacity:0.45;}
.cat-btn:disabled.sel{border-color:transparent;}
.cat-portrait{
  width:42px;height:42px;flex-shrink:0;border-radius:10px;
  image-rendering:pixelated;
  background:radial-gradient(circle at 50% 40%, #28331f, #161d12);
}
.cat-info{flex:1;min-width:0;}
.cat-name{font-family:var(--ds);font-size:16px;font-weight:700;color:var(--parch);}
.cat-role{font-family:var(--mo);font-size:10.5px;letter-spacing:0.04em;color:var(--parch-dim);text-transform:uppercase;}
.cat-trait{font-size:12px;color:var(--leaf-dim);margin-top:1px;}
.cat-check{
  width:24px;height:24px;flex-shrink:0;border-radius:50%;
  border:2px solid var(--moss-line);display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--night);transition:all .12s;
}
.cat-btn.sel .cat-check{background:var(--leaf);border-color:var(--leaf);}
.cat-status{font-size:11px;color:var(--blood);margin-top:1px;}

/* ============================================================
   MATH OVERLAY
   ============================================================ */
#screen-math{z-index:40;background:rgba(10,13,8,0.97);justify-content:center;}
.math-inner{
  flex:1;display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 22px calc(env(safe-area-inset-bottom,0px) + 16px);
}
.math-top{margin-bottom:auto;}
.math-zone-name{font-family:var(--mo);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ember-glow);text-align:center;}
.math-progress{display:flex;gap:6px;justify-content:center;margin-top:14px;}
.mp-dot{width:9px;height:9px;border-radius:50%;background:var(--bark-2);border:1px solid var(--moss-line);transition:all .2s;}
.mp-dot.correct{background:var(--leaf);border-color:var(--leaf);}
.mp-dot.wrong{background:var(--blood);border-color:var(--blood);}
.mp-dot.current{border-color:var(--ember);box-shadow:0 0 6px rgba(240,134,58,0.6);}
.math-timer-wrap{height:5px;background:var(--bark-2);border-radius:3px;margin:18px 0 26px;overflow:hidden;}
.math-timer{height:100%;width:100%;background:linear-gradient(90deg,var(--leaf),var(--ember));border-radius:3px;transition:width .1s linear;}
.math-problem{
  font-family:var(--mo);font-size:54px;font-weight:600;text-align:center;
  color:var(--parch);letter-spacing:0.02em;margin-bottom:8px;
}
.math-answer{
  font-family:var(--mo);font-size:38px;text-align:center;color:var(--ember-glow);
  min-height:50px;letter-spacing:0.06em;
}
.math-answer.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}40%{transform:translateX(9px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.math-bottom{margin-top:auto;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.numkey{
  height:58px;border-radius:13px;background:var(--bark-2);
  border:1px solid var(--moss-line);
  font-family:var(--mo);font-size:26px;font-weight:600;color:var(--parch);
  display:flex;align-items:center;justify-content:center;
  transition:transform .06s, background .1s;
}
.numkey:active{transform:scale(0.94);background:var(--moss);}
.numkey.wide{font-size:18px;}
.numkey-del{color:var(--ember-glow);}
.numkey-go{background:linear-gradient(180deg,var(--ember),var(--ember-deep));color:#1a0f05;border:none;font-size:18px;font-weight:700;}

/* ============================================================
   FULL-SCREEN STORY / CINEMATIC / RESOLUTION
   ============================================================ */
#screen-story,#screen-resolution,#screen-event,#screen-season{z-index:45;}
.story-inner{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(env(safe-area-inset-top,0px) + 30px) 24px calc(env(safe-area-inset-bottom,0px) + 24px);
  display:flex;flex-direction:column;
}
.story-bg-stars{position:absolute;inset:0;z-index:-1;}
.cinematic-kicker{font-family:var(--mo);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--silver-dim);text-align:center;margin-bottom:10px;}
.cinematic-rank{font-family:var(--ds);font-size:15px;color:var(--gold);text-align:center;font-weight:700;margin-bottom:6px;letter-spacing:0.03em;}
.cinematic-title{font-family:var(--ds);font-size:28px;font-weight:700;text-align:center;line-height:1.15;margin-bottom:22px;color:var(--parch);}
.cinematic-text{font-size:16.5px;line-height:1.75;color:var(--parch);margin-bottom:18px;}
.cinematic-text:first-letter{}
.starclan-msg{
  border-left:3px solid var(--silver-dim);
  background:rgba(201,214,232,0.07);
  padding:14px 18px;border-radius:0 12px 12px 0;
  font-style:italic;font-size:15.5px;line-height:1.6;color:var(--silver);
  margin:8px 0 24px;
}
.story-foot{margin-top:auto;padding-top:18px;}

/* resolution */
.res-head{text-align:center;margin-bottom:20px;}
.res-grade{font-family:var(--ds);font-size:34px;font-weight:700;margin-bottom:4px;}
.res-grade.exceptional{color:var(--gold);}
.res-grade.good{color:var(--leaf);}
.res-grade.average{color:var(--herb);}
.res-grade.poor{color:var(--ember);}
.res-grade.failed{color:var(--blood);}
.res-sub{font-size:14px;color:var(--parch-dim);}
.res-narr{
  background:var(--bark);border:1px solid var(--moss);border-radius:14px;
  padding:16px 18px;font-size:15.5px;line-height:1.6;color:var(--parch);margin-bottom:18px;
}
.res-deltas{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.res-delta{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bark-2);border-radius:10px;padding:11px 14px;
}
.res-delta-label{display:flex;align-items:center;gap:9px;font-size:14.5px;}
.res-delta-val{font-family:var(--mo);font-size:15px;font-weight:700;}
.res-delta-val.pos{color:var(--leaf);}
.res-delta-val.neg{color:var(--blood);}

/* event */
.event-icon{font-size:46px;text-align:center;margin-bottom:12px;}
.event-title{font-family:var(--ds);font-size:25px;font-weight:700;text-align:center;margin-bottom:14px;}
.event-text{font-size:16.5px;line-height:1.7;color:var(--parch);margin-bottom:20px;}
.event-choice{
  width:100%;text-align:left;background:var(--bark-2);
  border:1.5px solid var(--moss-line);border-radius:13px;
  padding:14px 16px;margin-bottom:10px;transition:transform .07s,border-color .12s,background .12s;
}
.event-choice:active{transform:scale(0.985);background:var(--moss);}
.event-choice-label{font-size:16px;font-weight:600;color:var(--parch);margin-bottom:4px;}
.event-choice-desc{font-size:13px;line-height:1.45;color:var(--parch-dim);}

/* season end */
.season-rank-badge{
  text-align:center;padding:24px;border-radius:18px;margin-bottom:20px;
  background:radial-gradient(circle at 50% 0%, rgba(232,184,74,0.18), transparent 70%);
  border:1px solid var(--moss-line);
}
.season-rank-name{font-family:var(--ds);font-size:34px;font-weight:700;color:var(--gold);}
.season-score{font-family:var(--mo);font-size:48px;font-weight:600;margin:8px 0;}
.ladder-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-radius:10px;margin-bottom:7px;background:var(--bark-2);
}
.ladder-row.you{background:var(--moss);border:1px solid var(--ember);}
.ladder-row.beaten{opacity:0.6;}
.ladder-name{font-family:var(--ds);font-size:16px;font-weight:600;}
.ladder-pts{font-family:var(--mo);font-size:14px;color:var(--parch-dim);}
.ladder-taunt{font-size:12px;font-style:italic;color:var(--parch-faint);margin-top:2px;max-width:200px;}

/* instruction tooltip (coach marks) */
.coach{
  position:absolute;z-index:60;
  background:var(--ember);color:#1a0f05;
  border-radius:13px;padding:13px 16px;
  font-size:14.5px;line-height:1.45;font-weight:500;
  max-width:280px;box-shadow:0 8px 30px rgba(0,0,0,0.5);
  animation:coachIn .35s ease;
}
@keyframes coachIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.coach strong{font-weight:700;}
.coach-btn{
  margin-top:11px;display:inline-block;
  background:#1a0f05;color:var(--ember-glow);
  font-family:var(--mo);font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
  padding:7px 14px;border-radius:8px;font-weight:600;
}
.coach-arrow{
  position:absolute;width:16px;height:16px;background:var(--ember);
  transform:rotate(45deg);
}

/* toast */
.toast{
  position:absolute;left:50%;top:calc(env(safe-area-inset-top,0px) + 70px);
  transform:translateX(-50%);z-index:70;
  background:var(--bark-2);border:1px solid var(--moss-line);
  color:var(--parch);padding:11px 18px;border-radius:12px;
  font-size:14px;max-width:300px;text-align:center;
  box-shadow:0 6px 24px rgba(0,0,0,0.5);
  opacity:0;transition:opacity .25s, transform .25s;
  pointer-events:none;
}
.toast.show{opacity:1;}

/* small helpers */
.spacer-sm{height:10px;}
.spacer-md{height:18px;}
.center{text-align:center;}
.danger-dots{display:inline-flex;gap:2px;}
.dd{width:6px;height:6px;border-radius:50%;background:var(--moss-line);}
.dd.on{background:var(--blood);}
</style>

<body>
<div id="app">
  <!-- screens injected/managed by JS below -->
</div>
<script type="module">
import {
  ZONES, EVENTS, STORY_ARCS, CAT_NAMES, PROPHECIES,
  SEASON_FLAVOR, UPGRADE_TEXT, RIVAL_TAUNTS
} from './starclan-content.js';

/* ===== engine-core (inlined) ===== */
/* ============================================================
   StarClan's Watch — Game Engine Core
   Pure logic (no DOM) so it can be unit-tested in Node.
   The DOM/render layer lives in engine-ui.js and is appended
   after this in the final single-file build.
   ============================================================ */

// ---- Tunable constants (balance lives here) ----
const CONFIG = {
  MATH_PER_PATROL: 10,
  MUL_DIV_SHARE: 0.75,        // 75% multiplication/division
  MAX_FACT: 12,               // tables up to 12x12
  TIMER_MS: 9000,             // per problem
  FAST_MS: 5000,              // answer with >this remaining = fast
  XP_PER_CORRECT: 9,
  XP_FAST_BONUS: 2,           // extra xp for fast correct
  HIGH_ACC_BONUS: 0.25,       // +25% xp if session accuracy >= 0.9
  HIGH_ACC_THRESHOLD: 0.9,
  START_PREY: 60,
  START_HERBS: 45,
  START_TERRITORY: 45,
  START_MORALE: 70,
  MAX_MORALE: 100,
  MAX_TERRITORY: 100,
  BASE_PREY_CAP: 100,         // level-1 fresh-kill pile cap (headroom so good early patrols aren't wasted)
  MOONS_PER_SEASON: 3,
  SEASONS: ["Greenleaf", "Leaf-fall", "Leaf-bare", "Newleaf"],
  YEAR_MOONS: 12,
  MAX_CLAN: 16,
  HUNGER_PREY: 10,            // below this for 2 moons -> a cat leaves
  LOW_MORALE: 20,             // below this -> patrol penalties
  LOW_TERRITORY: 15,          // below this -> rival contest
  LOW_HERBS: 15,
};

// Season modifiers
const SEASON_MOD = {
  "Greenleaf": { preyMult: 1.25, illness: 0.6, eat: 1.6, label: "🌿", color: "#7fae5a" },
  "Leaf-fall": { preyMult: 1.0, illness: 1.0, eat: 1.8, label: "🍂", color: "#d49a4a" },
  "Leaf-bare": { preyMult: 0.7, illness: 1.5, eat: 2.4, label: "❄️", color: "#b8c4d0" },
  "Newleaf": { preyMult: 1.15, illness: 0.8, eat: 1.7, label: "🌱", color: "#9ed468" },
};

// Rank thresholds (calibrated via simulation; tuned so ~85% players reach
// rank 4-5 across a 12-moon season, and legend requires sustained strong play)
const RANK_THRESHOLDS = [0, 130, 300, 520, 780, 1080];

const PERSONALITIES = ["Brave", "Cautious", "Clever", "Loyal", "Fierce"];
const SPECIALTIES = ["Hunt", "Herb", "Fight", "Scout"];

// ---- RNG (seedable for deterministic tests) ----
function makeRNG(seed) {
  let s = seed >>> 0;
  return function () {
    // xorshift32
    s ^= s << 13; s >>>= 0;
    s ^= s >> 17;
    s ^= s << 5; s >>>= 0;
    return (s >>> 0) / 4294967296;
  };
}
let _rng = Math.random;
function setRNG(fn) { _rng = fn; }
function rnd() { return _rng(); }
function rint(min, max) { return Math.floor(rnd() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(rnd() * arr.length)]; }

// ---- ID helper: always strings ----
let _idc = 0;
function newId() { _idc += 1; return "c" + _idc + "_" + Math.floor(rnd() * 100000); }
function resetIdCounter() { _idc = 0; }

// ============================================================
// CAT GENERATION
// ============================================================
const COATS = [
  { id: "ginger", name: "Ginger", base: "#d57a3a", belly: "#e8a868", stripe: "#a85420" },
  { id: "gray", name: "Gray", base: "#8a8f96", belly: "#b6bbc2", stripe: "#5e636b" },
  { id: "black", name: "Black", base: "#3a3d42", belly: "#54585e", stripe: "#24262a" },
  { id: "white", name: "White", base: "#e6e4dd", belly: "#f4f2ec", stripe: "#c4c1b6" },
  { id: "brown", name: "Brown", base: "#8a6240", belly: "#b08a5e", stripe: "#5e3f26" },
  { id: "cream", name: "Cream", base: "#e3c89a", belly: "#f0dcb8", stripe: "#c4a473" },
  { id: "tortie", name: "Tortie", base: "#a86838", belly: "#3a3d42", stripe: "#6e3f1e" },
  { id: "silver", name: "Silver", base: "#b4bcc6", belly: "#d8dde4", stripe: "#7e858f" },
];
const PATTERNS = ["tabby", "spotted", "solid", "patched"];
const EYES = [
  { id: "amber", name: "Amber", c: "#e8a838" },
  { id: "green", name: "Green", c: "#6cae54" },
  { id: "blue", name: "Blue", c: "#5a9ed6" },
  { id: "copper", name: "Copper", c: "#c87838" },
];

function genCat(opts = {}) {
  const coat = opts.coat || pick(COATS);
  return {
    id: newId(),
    name: opts.name || (pick(NAME_PREFIX) + pick(NAME_SUFFIX)),
    role: opts.role || "warrior",
    coat: typeof coat === "string" ? coat : coat.id,
    pattern: opts.pattern || pick(PATTERNS),
    eyes: opts.eyes || pick(EYES).id,
    accessory: opts.accessory || "none",
    age: opts.age != null ? opts.age : rint(14, 70),
    loyalty: opts.loyalty != null ? opts.loyalty : rint(55, 80),
    personality: opts.personality || pick(PERSONALITIES),
    specialty: opts.specialty || pick(SPECIALTIES),
    injured: false,
    sick: false,
    restMoons: 0,    // moons until recovered
    onPatrol: false,
  };
}

// Name parts (fallback; real content file overrides via setNames)
let NAME_PREFIX = ["Amber", "Ash", "Bramble", "Cinder", "Dawn", "Ember", "Fern", "Frost", "Hawk", "Ivy", "Leaf", "Moss", "Night", "Oak", "Raven", "Reed", "Silver", "Storm", "Thorn", "Willow"];
let NAME_SUFFIX = ["claw", "fur", "heart", "pelt", "tail", "whisker", "leaf", "storm", "flight", "stream", "step", "song", "fang", "shade", "fall"];
function setNames(prefixes, suffixes) {
  if (prefixes && prefixes.length) NAME_PREFIX = prefixes;
  if (suffixes && suffixes.length) NAME_SUFFIX = suffixes;
}

// Build a starting clan: leader (player) + 5 others
function makeStartingClan(playerCat) {
  const clan = [];
  const leader = Object.assign(genCat({ role: "leader" }), playerCat);
  leader.id = leader.id || newId();
  leader.role = "leader";
  leader.loyalty = 90;
  leader.injured = false; leader.sick = false; leader.restMoons = 0; leader.onPatrol = false;
  clan.push(leader);
  clan.push(genCat({ role: "deputy", loyalty: rint(75, 88), age: rint(30, 70), specialty: "Fight" }));
  clan.push(genCat({ role: "medicine", loyalty: rint(75, 88), age: rint(30, 80), specialty: "Herb" }));
  clan.push(genCat({ role: "warrior", specialty: "Hunt" }));
  clan.push(genCat({ role: "warrior", specialty: pick(["Fight", "Scout"]) }));
  clan.push(genCat({ role: "apprentice", age: rint(7, 11), loyalty: rint(60, 75) }));
  return clan;
}

// ============================================================
// FRESH GAME STATE
// ============================================================
function newGame(playerCat) {
  const clan = makeStartingClan(playerCat);
  return {
    version: 3,
    clan,
    leaderId: clan[0].id,
    res: {
      prey: CONFIG.START_PREY,
      herbs: CONFIG.START_HERBS,
      territory: CONFIG.START_TERRITORY,
      morale: CONFIG.START_MORALE,
    },
    structures: {
      fresh_kill_pile: 1,
      medicine_den: 1,
      training_grounds: 0,
      watchtower: 0,
      nursery: 0,
      leaders_rock: 0,
    },
    moon: 1,
    seasonIndex: 0,           // 0=Greenleaf ... cycles
    patrolsRemaining: 1,
    maxPatrols: 1,
    xp: 0,
    rankIndex: 0,
    arcIndex: 0,
    seasonScore: 0,
    moonScore: 0,
    bestScore: 0,
    hungryMoons: 0,
    exploredZones: [],        // zone ids that have been scouted/used
    contestedZones: [],       // zone ids seized by rivals
    factMastery: {},          // "7x8" -> 0..3
    seenEvents: [],           // event ids seen (avoid repeats)
    pendingCinematic: null,
    activeExpedition: null,    // {zoneId, catIds:[...]} — NEVER nulled by panel cleanup
    lastOutcome: null,
    coachSeen: {},            // which coach marks shown
    log: [],
  };
}

function curSeason(S) { return CONFIG.SEASONS[S.seasonIndex % 4]; }
function preyCap(S) {
  const lvl = S.structures.fresh_kill_pile;
  return [100, 100, 130, 160][lvl] || 100;  // lvl0/1=100, 2=130, 3=160
}
function clanSize(S) { return S.clan.length; }
function aliveLeader(S) { return S.clan.find(c => c.id === S.leaderId); }

// ============================================================
// MATH ENGINE (spaced repetition)
// ============================================================
function factKey(a, b, op) { return a + op + b; }

// Generate one problem, weighted toward low-mastery facts.
function genProblem(S) {
  const useMulDiv = rnd() < CONFIG.MUL_DIV_SHARE;
  if (useMulDiv) {
    // pick multiplication or division
    const isDiv = rnd() < 0.5;
    // weight toward unmastered facts: sample a few, choose least-mastered
    let best = null, bestM = 99;
    for (let i = 0; i < 4; i++) {
      const a = rint(2, CONFIG.MAX_FACT);
      const b = rint(2, CONFIG.MAX_FACT);
      const key = factKey(Math.min(a, b), Math.max(a, b), "x");
      const m = S.factMastery[key] || 0;
      if (m < bestM) { bestM = m; best = { a, b }; }
    }
    const { a, b } = best;
    if (isDiv) {
      const product = a * b;
      return {
        kind: "div",
        text: product + " ÷ " + a,
        answer: b,
        factKey: factKey(Math.min(a, b), Math.max(a, b), "x"),
      };
    } else {
      return {
        kind: "mul",
        text: a + " × " + b,
        answer: a * b,
        factKey: factKey(Math.min(a, b), Math.max(a, b), "x"),
      };
    }
  } else {
    // two-digit addition or subtraction
    const isSub = rnd() < 0.5;
    if (isSub) {
      let a = rint(20, 99), b = rint(10, 99);
      if (b > a) { const t = a; a = b; b = t; }
      return { kind: "sub", text: a + " − " + b, answer: a - b, factKey: factKey(a, b, "-") };
    } else {
      const a = rint(10, 89), b = rint(10, 99 - a > 0 ? Math.min(99, 99) : 10);
      const bb = rint(10, 99);
      return { kind: "add", text: a + " + " + bb, answer: a + bb, factKey: factKey(a, bb, "+") };
    }
  }
}

function buildProblemSet(S, n = CONFIG.MATH_PER_PATROL) {
  const set = [];
  for (let i = 0; i < n; i++) set.push(genProblem(S));
  return set;
}

// Record a fact result into mastery (correct raises, wrong lowers)
function recordFact(S, key, correct) {
  if (!key) return;
  const cur = S.factMastery[key] || 0;
  if (correct) S.factMastery[key] = Math.min(3, cur + 1);
  else S.factMastery[key] = Math.max(0, cur - 1);
}

// Convert a patrol's math performance into a grade + score
function gradePatrol(correct, total, fastCount) {
  const acc = total > 0 ? correct / total : 0;
  let grade;
  if (correct === total && fastCount >= Math.ceil(total * 0.6)) grade = "exceptional";
  else if (acc >= 0.8) grade = "good";
  else if (acc >= 0.55) grade = "average";
  else if (acc >= 0.25) grade = "poor";
  else grade = "failed";
  return { grade, acc };
}

// XP for a patrol
function xpForPatrol(correct, fastCount, acc) {
  let xp = correct * CONFIG.XP_PER_CORRECT + fastCount * CONFIG.XP_FAST_BONUS;
  if (acc >= CONFIG.HIGH_ACC_THRESHOLD) xp = Math.round(xp * (1 + CONFIG.HIGH_ACC_BONUS));
  return xp;
}

// Score contribution from a patrol (competitive)
function scoreForPatrol(correct, fastCount, wrong) {
  return Math.max(0, correct * 15 + fastCount * 4 - wrong * 6);
}

// ============================================================
// EXPEDITION RESOLUTION
// ============================================================
// Given a grade + zone + assigned cats, compute resource deltas + flags.
function resolveExpedition(S, zone, catIds, grade) {
  const cats = S.clan.filter(c => catIds.includes(c.id));
  const season = curSeason(S);
  const sm = SEASON_MOD[season];
  const richness = zone ? zone.richness : 3;
  const danger = zone ? zone.danger : 3;
  const ztype = zone ? zone.type : "Forest";

  // personality / specialty bonuses
  let huntBonus = 1, herbBonus = 1, fightBonus = 1, scoutBonus = 1, injuryMod = 0;
  cats.forEach(c => {
    if (c.specialty === "Hunt") huntBonus += 0.12;
    if (c.specialty === "Herb") herbBonus += 0.15;
    if (c.specialty === "Fight") fightBonus += 0.12;
    if (c.specialty === "Scout") scoutBonus += 0.15;
    if (c.personality === "Brave") { fightBonus += 0.1; injuryMod += 0.04; }
    if (c.personality === "Cautious") { injuryMod -= 0.05; huntBonus -= 0.03; }
    if (c.personality === "Clever") { herbBonus += 0.1; scoutBonus += 0.1; }
    if (c.personality === "Fierce") { fightBonus += 0.15; huntBonus -= 0.05; }
    if (c.personality === "Loyal") {
      const m = S.res.morale;
      if (m >= 60) { huntBonus += 0.08; fightBonus += 0.08; }
      else if (m < 40) { huntBonus -= 0.05; }
    }
  });

  // grade multiplier
  const gradeMult = { exceptional: 1.0, good: 0.72, average: 0.48, poor: 0.26, failed: 0.08 }[grade];

  const out = { prey: 0, herbs: 0, territory: 0, morale: 0, revealZone: false, injured: [], note: "" };

  // base yields by zone type, scaled by richness, season, grade, bonuses
  const r = 1 + (richness - 3) * 0.18;
  if (ztype === "River" || ztype === "Special") {
    out.herbs = Math.round((10 + richness * 2) * gradeMult * herbBonus * r);
    out.prey = Math.round((8 + richness) * gradeMult * huntBonus * r * sm.preyMult);
  } else if (ztype === "Moor") {
    out.prey = Math.round((14 + richness * 2) * gradeMult * huntBonus * r * sm.preyMult);
    out.territory = Math.round(4 * gradeMult * scoutBonus);
  } else if (ztype === "Rival Border") {
    out.territory = Math.round((8 + danger) * gradeMult * fightBonus);
    out.prey = Math.round(6 * gradeMult * huntBonus * sm.preyMult);
  } else if (ztype === "Shadow Forest") {
    // high risk, high reward, mixed
    out.prey = Math.round((10 + richness) * gradeMult * huntBonus * sm.preyMult);
    out.herbs = Math.round((8 + richness) * gradeMult * herbBonus);
    out.territory = Math.round(5 * gradeMult * fightBonus);
  } else if (ztype === "Mixed") {
    out.prey = Math.round((12 + richness) * gradeMult * huntBonus * r * sm.preyMult);
    out.herbs = Math.round(6 * gradeMult * herbBonus);
  } else { // Forest (default) - hunting grounds
    out.prey = Math.round((16 + richness * 2) * gradeMult * huntBonus * r * sm.preyMult);
    out.herbs = Math.round(3 * gradeMult * herbBonus);
  }

  // scouting reveal on good+ in scout-friendly zones
  if ((grade === "exceptional" || grade === "good") && scoutBonus > 1.1 && rnd() < 0.5) {
    out.revealZone = true;
  }

  // morale: good patrols lift, failed patrols dip
  if (grade === "exceptional") out.morale = 4;
  else if (grade === "good") out.morale = 2;
  else if (grade === "poor") out.morale = -2;
  else if (grade === "failed") out.morale = -4;

  // injury risk scales with danger and bad grade, minus cautious cats
  let injuryChance = (danger / 5) * 0.18 + injuryMod;
  if (grade === "poor") injuryChance += 0.12;
  if (grade === "failed") injuryChance += 0.22;
  if (grade === "exceptional") injuryChance -= 0.08;
  injuryChance = Math.max(0, injuryChance);
  // only non-leader, non-apprentice-favored: any assigned cat can be hurt
  cats.forEach(c => {
    if (rnd() < injuryChance) out.injured.push(c.id);
  });

  return out;
}

// Apply deltas to state, clamped to caps. Returns the applied deltas for display.
function applyDeltas(S, d) {
  const cap = preyCap(S);
  const applied = {};
  if (d.prey) {
    const before = S.res.prey;
    let next = before + d.prey;
    let overflow = 0;
    if (next > cap) { overflow = next - cap; next = cap; }
    next = Math.max(0, next);
    applied.prey = next - before;
    S.res.prey = next;
    // overflow converts to morale
    if (overflow > 0) { S.res.morale = Math.min(CONFIG.MAX_MORALE, S.res.morale + Math.floor(overflow / 4)); }
  }
  if (d.herbs) {
    const before = S.res.herbs;
    S.res.herbs = Math.max(0, Math.min(100, before + d.herbs));
    applied.herbs = S.res.herbs - before;
  }
  if (d.territory) {
    const before = S.res.territory;
    S.res.territory = Math.max(0, Math.min(CONFIG.MAX_TERRITORY, before + d.territory));
    applied.territory = S.res.territory - before;
  }
  if (d.morale) {
    const before = S.res.morale;
    S.res.morale = Math.max(0, Math.min(CONFIG.MAX_MORALE, before + d.morale));
    applied.morale = S.res.morale - before;
  }
  return applied;
}

// Apply a choice event's effects object
function applyChoiceEffects(S, effects) {
  if (!effects) return {};
  const d = {
    prey: effects.prey || 0,
    herbs: effects.herbs || 0,
    territory: effects.territory || 0,
    morale: effects.morale || 0,
  };
  const applied = applyDeltas(S, d);
  if (effects.xp) { S.xp += effects.xp; applied.xp = effects.xp; }
  if (effects.healCats) {
    let healed = 0;
    for (const c of S.clan) {
      if ((c.injured || c.sick) && healed < effects.healCats) {
        c.injured = false; c.sick = false; c.restMoons = 0; healed++;
      }
    }
    applied.healed = healed;
  }
  // injuryRisk / sicknessRisk apply a chance to a random assigned-or-any cat
  if (effects.injuryRisk && effects.injuryRisk > 0) {
    const candidates = S.clan.filter(c => c.role !== "leader" && !c.injured);
    if (candidates.length && rnd() < effects.injuryRisk) {
      const c = pick(candidates); c.injured = true; c.restMoons = rint(1, 2); applied.injuredOne = c.name;
    }
  }
  if (effects.sicknessRisk && effects.sicknessRisk > 0) {
    const candidates = S.clan.filter(c => !c.sick && !c.injured);
    if (candidates.length && rnd() < effects.sicknessRisk) {
      const c = pick(candidates); c.sick = true; c.restMoons = rint(1, 2); applied.sickOne = c.name;
    }
  }
  if (effects.revealZones) applied.reveal = effects.revealZones;
  return applied;
}

// ============================================================
// RANK / ARC PROGRESSION
// ============================================================
// Returns one of:
//   null                      -> no change
//   { rank: n }               -> advanced to rank index n within current arc
//   { arc: a, rank: 0 }       -> completed the arc, advanced to arc index a
function checkRankUp(S, arcCount) {
  const thresholds = RANK_THRESHOLDS;
  const lastRank = thresholds.length - 1;
  const totalArcs = arcCount || 3;

  // advance rank within the current arc
  let newRank = S.rankIndex;
  while (newRank < lastRank && S.xp >= thresholds[newRank + 1]) {
    newRank++;
  }

  // if we've reached the final rank AND earned enough beyond it, transition arc
  // (require an extra threshold-step worth of XP past the final rank to move on)
  const beyondFinal = thresholds[lastRank] + (thresholds[lastRank] - thresholds[lastRank - 1]);
  if (newRank >= lastRank && S.xp >= beyondFinal && S.arcIndex < totalArcs - 1) {
    S.arcIndex += 1;
    S.rankIndex = 0;
    S.xp = 0; // reset XP for the new arc's progression
    return { arc: S.arcIndex, rank: 0 };
  }

  if (newRank > S.rankIndex) {
    S.rankIndex = newRank;
    return { rank: newRank };
  }
  return null;
}

// ============================================================
// END MOON
// ============================================================
function endMoonPreview(S) {
  const season = curSeason(S);
  const eat = Math.round(SEASON_MOD[season].eat * clanSize(S));
  return { eat, season };
}

function endMoon(S) {
  const events = [];
  const season = curSeason(S);
  const sm = SEASON_MOD[season];

  // 1. Clan eats
  const eat = Math.round(sm.eat * clanSize(S));
  const beforePrey = S.res.prey;
  S.res.prey = Math.max(0, S.res.prey - eat);
  events.push({ type: "eat", amount: Math.min(eat, beforePrey), short: beforePrey });

  // 2. Hunger pressure
  if (S.res.prey < CONFIG.HUNGER_PREY) {
    S.hungryMoons += 1;
    if (S.hungryMoons >= 2) {
      // a non-essential cat leaves
      const leavers = S.clan.filter(c => c.role === "warrior" || c.role === "apprentice");
      if (leavers.length > 1) {
        const gone = pick(leavers);
        S.clan = S.clan.filter(c => c.id !== gone.id);
        events.push({ type: "left", name: gone.name });
        S.hungryMoons = 0;
        S.res.morale = Math.max(0, S.res.morale - 8);
      }
    } else {
      events.push({ type: "hunger_warn" });
    }
  } else {
    S.hungryMoons = 0;
  }

  // 3. Herb depletion from sick/injured
  const ailing = S.clan.filter(c => c.sick || c.injured).length;
  if (ailing > 0) {
    const used = Math.min(S.res.herbs, ailing * 4);
    S.res.herbs = Math.max(0, S.res.herbs - used);
  }

  // 4. Healing: medicine den heals N cats/moon if herbs available
  const denLvl = S.structures.medicine_den;
  const healCap = [0, 1, 2, 3][denLvl] || 1;
  let healed = 0;
  for (const c of S.clan) {
    if ((c.sick || c.injured) && healed < healCap) {
      if (S.res.herbs >= 5 || c.injured) { // injuries heal with rest; sickness needs herbs
        if (c.sick && S.res.herbs < 5) continue;
        if (c.sick) S.res.herbs = Math.max(0, S.res.herbs - 5);
        c.restMoons = Math.max(0, c.restMoons - 1);
        if (c.restMoons <= 0) { c.injured = false; c.sick = false; healed++; events.push({ type: "healed", name: c.name }); }
      }
    }
  }
  // cats not actively healed still tick down rest
  S.clan.forEach(c => {
    if ((c.injured || c.sick) && c.restMoons > 0) c.restMoons -= 0; // handled above; keep
  });

  // 5. Sickness generation
  let sickChance = 0.05 * sm.illness;
  sickChance *= (denLvl >= 2 ? 0.6 : 1);
  if (S.res.herbs < CONFIG.LOW_HERBS) sickChance *= 1.4;
  if (rnd() < sickChance) {
    const healthy = S.clan.filter(c => !c.sick && !c.injured && c.role !== "leader");
    if (healthy.length) {
      const c = pick(healthy); c.sick = true; c.restMoons = rint(1, 3);
      events.push({ type: "sick", name: c.name });
    }
  }

  // 6. Low morale consequence
  if (S.res.morale < CONFIG.LOW_MORALE) {
    events.push({ type: "low_morale" });
  }

  // 7. Low territory -> rival contest
  if (S.res.territory < CONFIG.LOW_TERRITORY) {
    events.push({ type: "rival_contest" });
    S.res.territory = Math.max(0, S.res.territory - 3);
  }

  // 8. Advance moon / season
  S.seasonScore += S.moonScore;
  S.moonScore = 0;
  S.moon += 1;
  // season advances every MOONS_PER_SEASON moons
  const newSeasonIndex = Math.floor((S.moon - 1) / CONFIG.MOONS_PER_SEASON) % 4;
  const seasonChanged = newSeasonIndex !== S.seasonIndex;
  S.seasonIndex = newSeasonIndex;

  // 9. Reset patrols
  const trainLvl = S.structures.training_grounds;
  S.maxPatrols = Math.min(3, 1 + trainLvl);
  S.patrolsRemaining = S.maxPatrols;

  // 10. Kit birth chance (nursery)
  const nurseryLvl = S.structures.nursery;
  if (nurseryLvl > 0 && clanSize(S) < CONFIG.MAX_CLAN) {
    const birthChance = [0, 0.05, 0.10, 0.15][nurseryLvl] || 0;
    if (rnd() < birthChance) {
      const kit = genCat({ role: "kit", age: 0, loyalty: 70 });
      S.clan.push(kit);
      events.push({ type: "kit", name: kit.name });
    }
  }

  // 11. Age cats, promote
  S.clan.forEach(c => {
    c.age += 1;
    if (c.role === "kit" && c.age >= 6) { c.role = "apprentice"; events.push({ type: "apprentice", name: c.name }); }
    else if (c.role === "apprentice" && c.age >= 12) { c.role = "warrior"; events.push({ type: "warrior", name: c.name }); }
  });

  return { events, seasonChanged, season: curSeason(S), yearEnd: (S.moon > CONFIG.YEAR_MOONS) };
}

// Whether the player can still send a patrol
function canPatrol(S) {
  if (S.patrolsRemaining <= 0) return false;
  if (S.res.morale < CONFIG.LOW_MORALE) return false; // refuse when morale critical
  const available = S.clan.filter(c => !c.injured && !c.sick && c.role !== "kit");
  return available.length >= 1;
}

function availableCats(S) {
  return S.clan.filter(c => !c.injured && !c.sick && c.role !== "kit");
}

// ============================================================
// EVENT SELECTION (weighted, avoid repeats)
// ============================================================
function pickZoneEvent(S, zone, EVENTS) {
  if (!zone || !zone.events) return null;
  const season = curSeason(S);
  const lowTerr = S.res.territory < 30;
  const pool = zone.events
    .map(eid => EVENTS.find(e => e.id === eid))
    .filter(Boolean);
  if (!pool.length) return null;
  // weight
  const weighted = pool.map(e => {
    let w = e.weight ? e.weight.base : 3;
    if (season === "Leaf-bare" && e.weight) w = e.weight.leaf_bare;
    if (lowTerr && e.weight && e.weight.low_territory) w = Math.max(w, e.weight.low_territory);
    // de-prioritize already-seen non-choice events
    if (S.seenEvents.includes(e.id) && !e.hasChoice) w *= 0.3;
    return { e, w };
  });
  const total = weighted.reduce((s, x) => s + x.w, 0);
  let r = rnd() * total;
  for (const x of weighted) { r -= x.w; if (r <= 0) return x.e; }
  return weighted[weighted.length - 1].e;
}

// =====================================================
// DOM HELPERS
// =====================================================
function el(tag, cls, txt) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (txt != null) n.textContent = txt;
  return n;
}
// Attach an activation handler that works reliably on iOS Safari.
// Distinguishes a genuine tap from a scroll by tracking finger movement,
// suppresses the synthetic ghost click so handlers never double-fire,
// and debounces rapid double-taps (a common iOS quirk) within 350ms.
function onActivate(node, handler) {
  if (!handler) return;
  let lastFire = 0;
  let touchHandled = false;
  let startX = 0, startY = 0, moved = false;
  const fire = (e) => {
    const now = Date.now();
    if (now - lastFire < 250) return; // debounce accidental double-tap
    lastFire = now;
    handler(e);
  };
  node.addEventListener("touchstart", (e) => {
    if (e.touches && e.touches.length === 1) {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false;
    }
  }, { passive: true });
  node.addEventListener("touchmove", (e) => {
    if (e.touches && e.touches.length === 1) {
      const dx = Math.abs(e.touches[0].clientX - startX);
      const dy = Math.abs(e.touches[0].clientY - startY);
      if (dx > 10 || dy > 10) moved = true; // it's a scroll, not a tap
    }
  }, { passive: true });
  node.addEventListener("touchend", (e) => {
    if (moved) return; // was a scroll, ignore
    if (e.changedTouches && e.changedTouches.length === 1) {
      touchHandled = true;
      fire(e);
      setTimeout(() => { touchHandled = false; }, 400);
    }
  }, { passive: true });
  node.addEventListener("click", (e) => {
    if (touchHandled) return; // touchend already handled it
    fire(e);
  });
}
function btn(cls, txt, onClick) {
  const b = document.createElement("button");
  b.type = "button";
  if (cls) b.className = cls;
  if (txt != null) b.textContent = txt;
  if (onClick) onActivate(b, onClick);
  return b;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

// =====================================================
// PIXEL CAT RENDERER
// Deterministic chunky pixel cat (ClanGen-inspired silhouette).
// Drawn on a 24x24 logical grid, DPR-aware for retina sharpness.
// =====================================================
function coatById(id) { return E.COATS.find(c => c.id === id) || E.COATS[0]; }
function eyeById(id) { return E.EYES.find(e => e.id === id) || E.EYES[0]; }

function drawCat(canvas, cat, scale) {
  const dpr = window.devicePixelRatio || 1;
  const GRID = 24;
  const px = scale;                 // CSS px per grid cell
  const cssSize = GRID * px;
  canvas.style.width = cssSize + "px";
  canvas.style.height = cssSize + "px";
  canvas.width = Math.round(cssSize * dpr);
  canvas.height = Math.round(cssSize * dpr);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssSize, cssSize);
  ctx.imageSmoothingEnabled = false;

  const coat = coatById(cat.coat);
  const eye = eyeById(cat.eyes);
  const base = coat.base, belly = coat.belly, stripe = coat.stripe;

  function p(x, y, color) { ctx.fillStyle = color; ctx.fillRect(x * px, y * px, px, px); }
  function rect(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x * px, y * px, w * px, h * px); }

  // ---- body silhouette (sitting cat, facing forward, top-down-ish) ----
  // Tail (curls on right side)
  rect(17, 12, 2, 6, base);
  p(18, 11, base); p(19, 12, base); p(19, 13, base); p(18, 17, base);
  // Haunches / body
  rect(7, 11, 10, 9, base);
  // Chest/belly lighter
  rect(9, 13, 6, 6, belly);
  // Front legs
  rect(8, 17, 2, 3, base);
  rect(14, 17, 2, 3, base);
  p(8, 19, belly); p(15, 19, belly); // paws
  // Head
  rect(8, 4, 8, 8, base);
  // Cheeks lighter
  rect(9, 8, 6, 3, belly);
  // Ears
  p(8, 3, base); p(9, 2, base); p(9, 3, base);
  p(15, 3, base); p(14, 2, base); p(14, 3, base);
  p(9, 3, stripe); p(14, 3, stripe); // inner ear hint

  // ---- pattern ----
  if (cat.pattern === "tabby") {
    // forehead M + back stripes
    p(11, 4, stripe); p(12, 4, stripe);
    p(10, 5, stripe); p(13, 5, stripe);
    rect(8, 12, 8, 1, stripe);
    rect(8, 14, 1, 4, stripe); rect(15, 14, 1, 4, stripe);
    p(11, 16, stripe); p(12, 16, stripe);
  } else if (cat.pattern === "spotted") {
    p(9, 12, stripe); p(12, 13, stripe); p(14, 15, stripe);
    p(10, 16, stripe); p(13, 17, stripe); p(8, 6, stripe); p(15, 6, stripe);
  } else if (cat.pattern === "patched") {
    rect(7, 11, 4, 4, stripe);
    rect(13, 15, 3, 4, stripe);
    p(8, 5, stripe); p(9, 6, stripe);
  }
  // "solid" = no extra pattern

  // ---- eyes ----
  p(10, 7, eye.c); p(13, 7, eye.c);
  // pupil
  p(10, 7, eye.c);
  // nose
  p(11, 9, "#3a2a2a"); p(12, 9, "#3a2a2a");
  // mouth hint
  p(11, 10, stripe);

  // ---- accessory ----
  if (cat.accessory === "leaf") { p(7, 4, "#5fb6a8"); p(6, 4, "#4a9488"); p(7, 3, "#6cc"); }
  else if (cat.accessory === "scar") { p(14, 5, "#c0563f"); p(14, 6, "#c0563f"); }
  else if (cat.accessory === "flower") { p(7, 3, "#e8a8c0"); p(6, 3, "#d488a8"); p(7, 2, "#f0c"); }
  else if (cat.accessory === "feather") { p(16, 4, "#c9d6e8"); p(17, 3, "#aebcd0"); }

  // role mark: leader gets a small star above head
  if (cat.role === "leader") {
    ctx.fillStyle = "#e8b84a";
    p(11, 1, "#e8b84a"); p(12, 1, "#e8b84a");
  } else if (cat.role === "medicine") {
    p(11, 1, "#5fb6a8"); p(12, 1, "#5fb6a8");
  }
}

// =====================================================
// STARFIELD (decorative canvas for cinematic backgrounds)
// =====================================================
function drawStarfield(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const rng = E.makeRNG(7);
  for (let i = 0; i < 70; i++) {
    const x = rng() * w, y = rng() * h * 0.7;
    const r = rng() * 1.4 + 0.3;
    ctx.globalAlpha = rng() * 0.6 + 0.2;
    ctx.fillStyle = "#c9d6e8";
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ===== engine-screens (inlined) ===== */
/* ============================================================
   StarClan's Watch — Screens & Game Loop
   Consumes engine-ui (which re-exports engine-core).
   RULES (hard-won): every interactive element is a real <button>
   with addEventListener at creation. No inline onclick. State
   object S is never nulled by panel cleanup. Cat IDs are strings.
   ============================================================ */
// =====================================================
// SAVE / LOAD
// =====================================================
function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify(UI.S)); } catch (e) {} }

// Validate a loaded save has the structural shape the engine needs.
// Returns the repaired state, or null if it's too broken to trust.
function validateAndRepair(data) {
  if (!data || typeof data !== "object") return null;
  if (data.version !== 3) return null;
  // required top-level shapes
  if (!Array.isArray(data.clan) || data.clan.length < 1) return null;
  if (!data.res || typeof data.res !== "object") return null;
  if (!data.structures || typeof data.structures !== "object") return null;

  // repair resources (clamp, default missing)
  const r = data.res;
  ["prey", "herbs", "territory", "morale"].forEach(k => {
    if (typeof r[k] !== "number" || !isFinite(r[k])) r[k] = 0;
    r[k] = Math.max(0, r[k]);
  });

  // repair each cat: ids must be strings, flags must exist
  for (const c of data.clan) {
    if (c == null || typeof c !== "object") return null;
    if (c.id == null) c.id = E.newId();
    c.id = String(c.id);
    if (typeof c.name !== "string" || !c.name) c.name = "Warrior";
    if (!c.role) c.role = "warrior";
    if (!c.coat) c.coat = "ginger";
    if (!c.pattern) c.pattern = "solid";
    if (!c.eyes) c.eyes = "amber";
    if (typeof c.loyalty !== "number" || !isFinite(c.loyalty)) c.loyalty = 60;
    if (typeof c.age !== "number" || !isFinite(c.age)) c.age = 20;
    c.injured = !!c.injured;
    c.sick = !!c.sick;
    c.onPatrol = false; // never resume stuck on patrol
    if (typeof c.restMoons !== "number") c.restMoons = 0;
    if (!c.personality) c.personality = "Loyal";
    if (!c.specialty) c.specialty = "Hunt";
  }

  // leader must exist; if missing, promote first cat
  if (!data.clan.some(c => c.id === data.leaderId)) {
    data.clan[0].role = "leader";
    data.leaderId = data.clan[0].id;
  }

  // numeric progression fields
  const numDefaults = {
    moon: 1, seasonIndex: 0, patrolsRemaining: 1, maxPatrols: 1,
    xp: 0, rankIndex: 0, arcIndex: 0, seasonScore: 0, moonScore: 0,
    bestScore: 0, hungryMoons: 0,
  };
  Object.entries(numDefaults).forEach(([k, def]) => {
    if (typeof data[k] !== "number" || !isFinite(data[k])) data[k] = def;
  });
  // clamp indices into valid ranges
  data.rankIndex = Math.max(0, Math.min(5, Math.floor(data.rankIndex)));
  data.arcIndex = Math.max(0, Math.min(2, Math.floor(data.arcIndex)));
  data.seasonIndex = ((Math.floor(data.seasonIndex) % 4) + 4) % 4;
  data.moon = Math.max(1, Math.floor(data.moon));
  data.patrolsRemaining = Math.max(0, Math.floor(data.patrolsRemaining));

  // array/object fields
  if (!Array.isArray(data.exploredZones)) data.exploredZones = [];
  if (!Array.isArray(data.contestedZones)) data.contestedZones = [];
  if (!Array.isArray(data.seenEvents)) data.seenEvents = [];
  if (!data.factMastery || typeof data.factMastery !== "object") data.factMastery = {};
  if (!data.coachSeen || typeof data.coachSeen !== "object") data.coachSeen = {};

  // structures: ensure all keys exist
  const structDefaults = { fresh_kill_pile: 1, medicine_den: 1, training_grounds: 0, watchtower: 0, nursery: 0, leaders_rock: 0 };
  Object.entries(structDefaults).forEach(([k, def]) => {
    if (typeof data.structures[k] !== "number") data.structures[k] = def;
  });

  // transient fields cleared on load
  data.activeExpedition = null;
  data.pendingCinematic = null;
  data._pendingEvent = null;

  if (!data.clanName) data.clanName = "ThunderClan";

  return data;
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    const repaired = validateAndRepair(data);
    if (!repaired) { wipeSave(); return false; }
    UI.S = repaired;
    return true;
  } catch (e) {
    // corrupt save: clear it and start fresh rather than white-screen
    wipeSave();
    return false;
  }
}
function wipeSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }

// =====================================================
// COACH MARKS (instructions at the right moment)
// =====================================================
function coach(key, html, opts = {}) {
  if (!UI.S) return;
  if (UI.S.coachSeen && UI.S.coachSeen[key]) return;
  if (UI.S.coachSeen) { UI.S.coachSeen[key] = true; save(); }
  const c = el("div", "coach");
  c.innerHTML = html;
  const b = el("div", "coach-btn", opts.btnText || "Got it");
  c.appendChild(b);
  UI.app.appendChild(c);
  requestAnimationFrame(() => {
    const cw = c.offsetWidth, ch = c.offsetHeight;
    let top = opts.top != null ? opts.top : (window.innerHeight * 0.5 - ch / 2);
    let left = (UI.app.clientWidth) / 2 - cw / 2;
    left = Math.max(10, Math.min(left, UI.app.clientWidth - cw - 10));
    top = Math.max(60, top);
    c.style.left = left + "px";

function drawIntroArt(canvas, pageNum) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || 320, h = 200;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, "#1a2436"); g.addColorStop(0.6, "#141a26"); g.addColorStop(1, "#10140f");
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  const rng = E.makeRNG(pageNum * 13 + 3);
  for (let i = 0; i < 50; i++) {
    ctx.globalAlpha = rng() * 0.7 + 0.2; ctx.fillStyle = "#c9d6e8";
    ctx.beginPath(); ctx.arc(rng() * w, rng() * h * 0.55, rng() * 1.3 + 0.3, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#e8e0cf"; ctx.beginPath(); ctx.arc(w * 0.78, h * 0.26, 22, 0, 7); ctx.fill();
  ctx.fillStyle = "#141a26"; ctx.beginPath(); ctx.arc(w * 0.84, h * 0.22, 18, 0, 7); ctx.fill();
  ctx.fillStyle = "#0c0f0a"; ctx.beginPath(); ctx.moveTo(0, h);
  for (let x = 0; x <= w; x += 12) {
    const treeH = h * 0.5 + Math.sin(x * 0.06 + pageNum) * 18 + (E.makeRNG(x + pageNum)() * 30);
    ctx.lineTo(x, h - treeH * 0.5);
  }
  ctx.lineTo(w, h); ctx.closePath(); ctx.fill();
  if (pageNum === 1) {
    ctx.fillStyle = "#f0c060";
    [[w*0.2,h*0.8],[w*0.24,h*0.8],[w*0.5,h*0.88],[w*0.54,h*0.88]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.6,0,7);ctx.fill();});
  } else if (pageNum === 2) {
    const fg = ctx.createRadialGradient(w*0.3, h*0.85, 2, w*0.3, h*0.85, 40);
    fg.addColorStop(0, "rgba(240,134,58,0.8)"); fg.addColorStop(1, "rgba(240,134,58,0)");
    ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(w*0.3, h*0.85, 40, 0, 7); ctx.fill();
  } else {
    ctx.fillStyle = "#dde6f0";
    for (let i = 0; i < 18; i++) { ctx.globalAlpha = rng()*0.6+0.3; ctx.beginPath(); ctx.arc(rng()*w, h*0.6+rng()*h*0.4, 1.4, 0, 7); ctx.fill(); }
    ctx.globalAlpha = 1;
  }
}

// =====================================================
// MAP RENDERING
// =====================================================
function availableMapZones() {
  const s = UI.S;
  const unlocked = ZONES.filter(z => z.unlockRequirement <= s.res.territory);
  unlocked.sort((a, b) => a.unlockRequirement - b.unlockRequirement);
  return unlocked.slice(0, 8);
}
function layoutMap() {
  const wrap = mapCanvas.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  mapCanvas.width = w * dpr; mapCanvas.height = h * dpr;
  mapCanvas.style.width = w + "px"; mapCanvas.style.height = h + "px";
  const zones = availableMapZones();
  mapZones = [];
  const cx = w / 2, cy = h / 2;
  const ringR = Math.min(w, h) * 0.37;
  const nodeR = Math.max(24, Math.min(32, w * 0.082));
  zones.forEach((z, i) => {
    const ang = (-Math.PI / 2) + (i / zones.length) * Math.PI * 2;
    mapZones.push({ zone: z, x: cx + Math.cos(ang) * ringR, y: cy + Math.sin(ang) * ringR, r: nodeR });
  });
  mapZones._camp = { x: cx, y: cy, r: nodeR * 1.2 };
  // Publish a READ-ONLY snapshot of rendered node geometry (CSS px within the
  // canvas) so automated tests can click real pixel coordinates on the canvas.
  // This exposes geometry only; it does not drive or advance the game.
  try {
    const snap = { _camp: { x: cx, y: cy } };
    mapZones.forEach(mz => { snap[mz.zone.id] = { x: mz.x, y: mz.y, r: mz.r }; });

}
function zoneIcon(z) {
  const t = z.type;
  if (t === "Forest") return "\ud83c\udf32";
  if (t === "River") return "\ud83c\udf0a";
  if (t === "Moor") return "\ud83c\udf3e";
  if (t === "Shadow Forest") return "\ud83c\udf11";
  if (t === "Rival Border") return "\u2694\ufe0f";
  if (t === "Special") return "\u2728";

}
function drawMap() {
  if (!mapCanvas || !mapZones || !mapZones._camp) return;
  const wrap = mapCanvas.parentElement;
  if (!wrap) return;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  const ctx = mapCanvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const s = UI.S;
  const camp = mapZones._camp;

  // paths
  ctx.strokeStyle = "rgba(63,79,51,0.45)"; ctx.lineWidth = 2;
  mapZones.forEach(mz => { ctx.beginPath(); ctx.moveTo(camp.x, camp.y); ctx.lineTo(mz.x, mz.y); ctx.stroke(); });

  // zone nodes
  mapZones.forEach(mz => {
    const z = mz.zone;
    const selected = z.id === selectedZoneId;
    const contested = s.contestedZones && s.contestedZones.includes(z.id);
    ctx.save();
    if (selected) { ctx.shadowColor = "rgba(240,134,58,0.8)"; ctx.shadowBlur = 18; }
    ctx.beginPath(); ctx.arc(mz.x, mz.y, mz.r, 0, 7);
    ctx.fillStyle = contested ? "#5a4a4a" : (z.terrain_color || "#33402a");
    ctx.fill();
    ctx.restore();
    ctx.lineWidth = selected ? 3 : 1.5;
    ctx.strokeStyle = selected ? "#f0863a" : "rgba(232,224,207,0.3)";
    ctx.stroke();
    // icon
    ctx.font = (mz.r * 0.95) + "px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(contested ? "\u26a0\ufe0f" : zoneIcon(z), mz.x, mz.y - 2);
    // danger dots under node
    ctx.fillStyle = "#c0563f";
    const dd = z.danger || 1;
    for (let i = 0; i < dd; i++) {
      ctx.beginPath();
      ctx.arc(mz.x - (dd - 1) * 3 + i * 6, mz.y + mz.r + 7, 1.8, 0, 7);
      ctx.fill();
    }
    // name label when selected
    if (selected) {
      ctx.fillStyle = "#e8e0cf"; ctx.font = "600 11px -apple-system, sans-serif";
      ctx.fillText(z.name, mz.x, mz.y + mz.r + 18);
    }
  });

  // camp in center
  ctx.save();
  ctx.beginPath(); ctx.arc(camp.x, camp.y, camp.r, 0, 7);
  const cg = ctx.createRadialGradient(camp.x, camp.y - 4, 2, camp.x, camp.y, camp.r);
  cg.addColorStop(0, "#3a2e1e"); cg.addColorStop(1, "#241c12");
  ctx.fillStyle = cg; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = "#f0863a"; ctx.stroke();
  // campfire flicker
  const t = Date.now() / 200;
  const flick = 1 + Math.sin(t) * 0.12;
  const fg = ctx.createRadialGradient(camp.x, camp.y, 1, camp.x, camp.y, camp.r * 0.7 * flick);
  fg.addColorStop(0, "rgba(255,176,102,0.9)"); fg.addColorStop(0.5, "rgba(240,134,58,0.5)"); fg.addColorStop(1, "rgba(240,134,58,0)");
  ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(camp.x, camp.y, camp.r * 0.7 * flick, 0, 7); ctx.fill();
  ctx.font = (camp.r * 0.8) + "px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("\ud83d\udd25", camp.x, camp.y);
  ctx.restore();
  // camp label
  ctx.fillStyle = "#e8b84a"; ctx.font = "700 11px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(s.clanName || "Your Camp", camp.x, camp.y + camp.r + 14);

  // tiny cat sprites resting around camp (clan presence)
  const resting = E.availableCats(s).slice(0, 5);
  resting.forEach((c, i) => {
    const ang = (i / Math.max(1, resting.length)) * Math.PI * 2 + 0.6;
    const rx = camp.x + Math.cos(ang) * (camp.r + 16);
    const ry = camp.y + Math.sin(ang) * (camp.r + 16);
    const coat = E.COATS.find(cc => cc.id === c.coat) || E.COATS[0];
    ctx.fillStyle = coat.base;
    ctx.beginPath(); ctx.arc(rx, ry, 3.2, 0, 7); ctx.fill();
  });
}

let mapAnimRAF = null;

function onMapClick(ev) {
  if (!mapZones || !mapZones._camp) return;
  const rect = mapCanvas.getBoundingClientRect();
  const x = ev.clientX - rect.left, y = ev.clientY - rect.top;
  // camp?
  const camp = mapZones._camp;
  if (camp && Math.hypot(x - camp.x, y - camp.y) <= camp.r) { openCampSheet(); return; }
  for (const mz of mapZones) {
    if (Math.hypot(x - mz.x, y - mz.y) <= mz.r + 6) {
      selectedZoneId = mz.zone.id;
      drawMap();
      // if patrols available, open the zone sheet right away
      if (E.canPatrol(UI.S)) openZoneSheet(mz.zone.id);
      else toast(mz.zone.name + " \u2014 no patrols left this moon");

}

let sheetScrim = null, sheetEl = null;
function ensureSheet() {
  if (sheetScrim) return;
  sheetScrim = el("div", "sheet-scrim");
  sheetScrim.addEventListener("click", closeSheet);
  sheetEl = el("div", "sheet");
  UI.app.appendChild(sheetScrim);
  UI.app.appendChild(sheetEl);
}
function openSheet(buildFn) {
  ensureSheet();
  clear(sheetEl);
  // re-enable interaction (closeSheet disables it on the way out)
  sheetEl.removeAttribute("aria-hidden");
  sheetEl.removeAttribute("inert");
  sheetEl.style.pointerEvents = "";
  buildFn(sheetEl);
  sheetScrim.style.pointerEvents = ""; // clear any inline override from closeSheet
  sheetScrim.classList.add("show");
  requestAnimationFrame(() => sheetEl.classList.add("show"));
}
function closeSheet(opts) {
  if (!sheetEl) return;
  const wasShown = sheetEl.classList.contains("show");
  sheetEl.classList.remove("show");
  sheetScrim.classList.remove("show");
  // The scrim fades to opacity:0 but an opacity:0 element still receives taps.
  // Explicitly make it non-interactive so it can't intercept map/End-Moon taps.
  sheetScrim.style.pointerEvents = "none";
  // Immediately make the (sliding-out) sheet non-interactive and unfocusable
  // so no stale cat/launch buttons can be tapped or seen by AT/tests while
  // a math/result/event screen is up.
  sheetEl.setAttribute("aria-hidden", "true");
  sheetEl.setAttribute("inert", "");
  sheetEl.style.pointerEvents = "none";
  // blur anything focused inside the sheet
  if (document.activeElement && sheetEl.contains(document.activeElement)) {
    document.activeElement.blur();
  }
  // Empty the sheet DOM once it has slid off-screen (or immediately if it
  // was never shown / caller wants it now). This removes the stale buttons
  // entirely rather than just hiding them.
  const wipe = () => { if (sheetEl) clear(sheetEl); };
  if (wasShown && !(opts && opts.immediate)) {
    setTimeout(wipe, 280); // matches the slide-out transition
  } else {
    wipe();
  }
}

// ---- LAUNCH: copy expedition before any cleanup ----
function launchExpedition(zoneId) {
  const s = UI.S;
  if (!s.activeExpedition || s.activeExpedition.catIds.length === 0) { toast("Select at least one cat"); return; }
  // COPY the expedition object before any cleanup.
  const exp = { zoneId: s.activeExpedition.zoneId, catIds: s.activeExpedition.catIds.slice() };

function startMath(exp) {
  const s = UI.S;
  const zone = ZONES.find(z => z.id === exp.zoneId);
  UI.mathSession = {
    exp, zone,
    problems: E.buildProblemSet(s),

  };

  setTimeout(() => {
    coach("math", "Type your answer, then tap <strong>Enter</strong>. Answer fast for a stronger patrol \u2014 but a right answer always beats a quick wrong one.", { btnText: "Start", top: window.innerHeight * 0.12, then: () => startTimer() });
  }, 200);
}

function showProblem() {
  const ms = UI.mathSession;
  if (!ms) return;
  const refs = UI.screens["math"] && UI.screens["math"]._refs;
  if (!refs) return;
  const { problem, answer } = refs;
  const p = ms.problems[ms.idx];
  if (!p) return;
  problem.textContent = p.text;
  ms.current = "";
  answer.textContent = "";
  // update dots
  const dots = UI.screens["math"]._refs.progress.children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.toggle("current", i === ms.idx);
  }
}

let timerActive = false;
function startTimer() {
  const ms = UI.mathSession;
  if (!ms) return;
  ms.timerStart = Date.now();
  timerActive = true;
  tickTimer();
}
function tickTimer() {
  const ms = UI.mathSession;
  if (!ms || !timerActive) return;
  const refs = UI.screens["math"] && UI.screens["math"]._refs;
  if (!refs) return;
  const { timer } = refs;
  const elapsed = Date.now() - ms.timerStart;
  const remain = Math.max(0, E.CONFIG.TIMER_MS - elapsed);
  const pct = (remain / E.CONFIG.TIMER_MS) * 100;
  timer.style.width = pct + "%";
  if (remain <= 0) { submitAnswer(true); return; }
  ms.timerRAF = requestAnimationFrame(tickTimer);
}
function stopTimer() { timerActive = false; const ms = UI.mathSession; if (ms && ms.timerRAF) cancelAnimationFrame(ms.timerRAF); }

function onNumKey(k) {
  const ms = UI.mathSession;
  if (!ms) return;
  const { answer } = UI.screens["math"]._refs;
  if (k === "del") { ms.current = ms.current.slice(0, -1); answer.textContent = ms.current; return; }
  if (k === "go") { if (ms.current.length) submitAnswer(false); return; }
  if (ms.current.length < 4) { ms.current += k; answer.textContent = ms.current; }
}

function submitAnswer(timedOut) {
  const ms = UI.mathSession;
  if (!ms) return;
  const refs = UI.screens["math"] && UI.screens["math"]._refs;
  if (!refs) return;
  stopTimer();
  const p = ms.problems[ms.idx];
  if (!p) return;
  const { answer } = refs;
  const given = parseInt(ms.current, 10);
  const correct = !timedOut && given === p.answer;
  const elapsed = Date.now() - ms.timerStart;
  const fast = correct && elapsed < E.CONFIG.FAST_MS;

  E.recordFact(UI.S, p.factKey, correct);
  if (correct) { ms.correct++; if (fast) ms.fast++; }
  else { ms.wrong++; }

  // update dot
  const dots = UI.screens["math"]._refs.progress.children;
  dots[ms.idx].classList.remove("current");
  dots[ms.idx].classList.add(correct ? "correct" : "wrong");

  if (!correct) {
    answer.classList.add("shake");
    answer.textContent = timedOut ? ("\u23f1 " + p.answer) : (ms.current + " \u2717 " + p.answer);
    setTimeout(() => { answer.classList.remove("shake"); nextProblem(); }, 850);
  } else {
    answer.textContent = ms.current + " \u2713";
    setTimeout(() => nextProblem(), 350);
  }
}

function nextProblem() {
  const ms = UI.mathSession;
  if (!ms) return;
  ms.idx++;
  if (ms.idx >= ms.problems.length) { finishMath(); return; }
  showProblem();
  startTimer();
}

function finishMath() {
  const ms = UI.mathSession;
  // upgrade challenges resolve differently
  if (ms && ms.isUpgrade) { finishUpgrade(); return; }
  const s = UI.S;
  stopTimer();
  const total = ms.problems.length;
  const { grade, acc } = E.gradePatrol(ms.correct, total, ms.fast);
  const xp = E.xpForPatrol(ms.correct, ms.fast, acc);
  const score = E.scoreForPatrol(ms.correct, ms.fast, ms.wrong);
  s.xp += xp;
  s.moonScore += score;

  // resolve expedition resources
  const zone = ms.zone;
  const deltas = E.resolveExpedition(s, zone, ms.exp.catIds, grade);
  const applied = E.applyDeltas(s, deltas);

  // apply injuries
  deltas.injured.forEach(id => {
    const c = s.clan.find(x => String(x.id) === String(id));
    if (c && c.role !== "leader") { c.injured = true; c.restMoons = E.rint(1, 2); }
  });

  // reveal zone (territory bump beyond resource)
  if (deltas.revealZone) { s.res.territory = Math.min(100, s.res.territory + 3); }

  // clear onPatrol flags for these cats (CRITICAL: makes them selectable again)
  ms.exp.catIds.forEach(id => { const c = s.clan.find(x => String(x.id) === String(id)); if (c) c.onPatrol = false; });

  // consume a patrol
  s.patrolsRemaining = Math.max(0, s.patrolsRemaining - 1);

  // mark zone explored
  if (!s.exploredZones.includes(zone.id)) s.exploredZones.push(zone.id);

  // store outcome for resolution screen
  s.lastOutcome = {
    grade, acc, correct: ms.correct, total, fast: ms.fast, xp, score,
    applied, injured: deltas.injured.map(id => { const c = s.clan.find(x => String(x.id) === String(id)); return c ? c.name : null; }).filter(Boolean),
    zoneName: zone.name,
  };

  // pick a possible event for after resolution
  const ev = E.pickZoneEvent(s, zone, EVENTS);
  s._pendingEvent = ev || null;

  // rank up / arc transition?
  const change = E.checkRankUp(s, STORY_ARCS.length);
  s.pendingCinematic = change; // null | {rank} | {arc, rank}

  save();
  UI.mathSession = null;
  showResolution();
}
